name: Merge Checks

# The project's own CI: format, lint, and relative-link checks that gate merges
# to the default branch. This is the CI the loop-engineering change loop's
# tail polls after a push (see .claude/skills/loop-engineering/SKILL.md). Keep
# REVIEW.md's do-not-report list in sync with exactly what this job enforces.

on:
  pull_request:
  push:
    branches: [main] # ← the project's default branch

# Cancel superseded runs on PR refs only: on the default branch every push is a
# distinct merged commit whose checks must run to completion, or back-to-back
# merges leave earlier commits with cancelled (never-completed) verification.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm
      - name: Dependency Installation
        run: "npm install"
      - name: Format Check
        run: "npm run format:check"
      - name: Lint
        run: "npm run lint"
      - name: Link Check
        run: "./.claude/skills/agent-skill-authoring/scripts/check-links.sh"
