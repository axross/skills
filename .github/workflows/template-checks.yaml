name: Template Checks

# The TEMPLATE REPOSITORY's own CI — not part of any adapted project's CI.
# Keeps the template's cross-linked skill tree honest by running the Markdown
# quality suite (Prettier format check, markdownlint, and the relative-link
# checker) on every change.
#
# The tooling itself survives adaptation: the npm scripts (see package.json),
# the Prettier/markdownlint config, and the link checker (which ships with the
# agent-skills-best-practices skill) all stay. THIS WORKFLOW FILE does not —
# adapted projects delete it in INIT Step 7 together with INIT.md, init.sh, and
# tokens.json. A project that wants an ongoing Markdown gate wires `npm run
# check` (or the individual scripts) into its own CI.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  checks:
    name: Markdown Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm
      - name: Dependency Installation
        run: npm install
      - name: Format Check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Link Check
        run: npm run links
